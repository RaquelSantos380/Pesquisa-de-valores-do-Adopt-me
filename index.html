<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#e91e63">
    <meta name="description" content="Pesquise e descubra os valores dos pets do Adopt Me! - Mais de 1000 pets">
    <title>Adopt Me Pets - Inventário Completo</title>
    <link rel="icon" type="image/x-icon" href="Raky%20-%20Copia.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header Glassmorphism */
        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #e91e63;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.3);
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            background: linear-gradient(135deg, #e91e63, #ff9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 15px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #e91e63; }
        .stat-label { font-size: 0.75rem; color: #666; }

        /* Search Bar */
        .search-wrapper {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #e91e63;
            font-size: 1.2rem;
        }

        #pesquisa {
            width: 100%;
            padding: 18px 20px 18px 55px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            background: white;
        }

        #pesquisa:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.3);
        }

        /* Filtros Rápidos */
        .filtros-rapidos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .filtro-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filtro-btn i { font-size: 1rem; }

        .filtro-btn:hover {
            transform: translateY(-2px);
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filtro-btn.active {
            background: linear-gradient(135deg, #e91e63, #d81b60);
            color: white;
        }

        /* Ordenação */
        .ordenacao-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
        }

        .ordenacao-select {
            padding: 10px 15px;
            border-radius: 40px;
            border: 2px solid #e91e63;
            background: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
        }

        .result-info {
            font-size: 0.85rem;
            color: #666;
        }

        .result-info strong {
            color: #e91e63;
            font-size: 1.1rem;
        }

        /* Controles de Paginação */
        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .page-btn:hover:not(:disabled) {
            background: #e91e63;
            color: white;
            transform: translateY(-2px);
        }

        .page-btn.active {
            background: linear-gradient(135deg, #e91e63, #d81b60);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-numbers {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Grid de Pets */
        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            min-height: 400px;
        }

        .pet-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-left: 5px solid;
            animation: fadeInUp 0.3s ease forwards;
            position: relative;
            overflow: hidden;
        }

        /* Badge de valor alto */
        .pet-card.valor-alto::after {
            content: '💎';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
            opacity: 0.5;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pet-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.15);
        }

        .pet-card.lendario { border-left-color: #ff9800; }
        .pet-card.raro { border-left-color: #9c27b0; }
        .pet-card.comum { border-left-color: #2196f3; }
        .pet-card.ultra { border-left-color: #e91e63; }
        .pet-card.default { border-left-color: #e91e63; }

        .pet-info { flex: 1; }
        .pet-name { font-weight: 700; font-size: 1rem; color: #333; margin-bottom: 5px; }
        
        .pet-category {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .pet-category.lendario { background: linear-gradient(135deg, #ff9800, #ff5722); color: white; }
        .pet-category.raro { background: linear-gradient(135deg, #9c27b0, #673ab7); color: white; }
        .pet-category.comum { background: linear-gradient(135deg, #2196f3, #03a9f4); color: white; }
        .pet-category.ultra { background: linear-gradient(135deg, #e91e63, #c2185b); color: white; }

        .pet-value { text-align: right; }
        .value-amount { font-size: 1.2rem; font-weight: 800; color: #4caf50; }
        .value-label { font-size: 0.65rem; color: #999; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }
        .loading i { font-size: 2.5rem; color: #e91e63; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }

        /* Footer */
        .glass-footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e91e63, #d81b60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: scale(1.1) rotate(10deg);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #e91e63, #d81b60); border-radius: 10px; }

        /* Top Button */
        .top-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e91e63, #d81b60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            z-index: 1000;
        }

        .top-btn.show {
            opacity: 1;
            visibility: visible;
        }

        .top-btn:hover {
            transform: scale(1.1);
        }

        /* Responsivo */
        @media (max-width: 768px) {
            body { padding: 15px; }
            h1 { font-size: 1.5rem; }
            .logo-img { width: 70px; height: 70px; }
            .pets-grid { grid-template-columns: 1fr; }
            .pet-card { flex-direction: column; text-align: center; }
            .pet-value { text-align: center; margin-top: 10px; }
            .filtro-btn { padding: 8px 15px; font-size: 0.75rem; }
            .filtros-rapidos { gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="glass-header">
            <img src="Raky.jpg" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/100'">
            <h1>🐾 Inventário Completo Adopt Me</h1>
            <div class="subtitle">Mais de 1000 pets organizados para você</div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Search -->
        <div class="search-wrapper">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="pesquisa" placeholder="Pesquise pelo nome do pet...">
            </div>
        </div>

        <!-- Filtros Rápidos -->
        <div class="filtros-rapidos" id="filtrosRapidos"></div>

        <!-- Ordenação -->
        <div class="ordenacao-bar">
            <div class="result-info" id="resultInfo"></div>
            <select class="ordenacao-select" id="ordenacaoSelect">
                <option value="valor_desc">💰 Mais Caros Primeiro ⭐</option>
                <option value="valor_asc">💰 Mais Baratos Primeiro</option>
                <option value="nome_asc">📝 Nome (A-Z)</option>
                <option value="nome_desc">📝 Nome (Z-A)</option>
                <option value="categoria">🏷️ Por categoria</option>
            </select>
        </div>

        <!-- Grid de Pets -->
        <div class="pets-grid" id="petsGrid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Carregando pets...</p></div>
        </div>

        <!-- Paginação -->
        <div class="pagination-controls" id="paginationControls"></div>

        <!-- Botões extras -->
        <div class="filtros-rapidos" style="justify-content: center;">
            <button class="filtro-btn" onclick="window.location.href='https://raquelsantos380.github.io/Recomende-pra-gente-/'">
                <i class="fas fa-question-circle"></i> Não encontrou?
            </button>
            <button class="filtro-btn" onclick="window.open('https://raquelsantos380.github.io/Pagamento/', '_blank')">
                <i class="fas fa-credit-card"></i> Pagamento
            </button>
            <button class="filtro-btn" onclick="window.open('https://wa.me/61910011', '_blank')">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </button>
        </div>

        <!-- Footer -->
        <div class="glass-footer">
            <div class="social-links">
                <a href="https://wa.me/61910011" class="social-link" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://api.whatsapp.com/send?phone=62992900737" class="social-link" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://rakyofficialstore.wordpress.com/sobre/" class="social-link" target="_blank"><i class="fas fa-globe"></i></a>
            </div>
            <div class="copyright">
                <p>© 2024 Pesquisa de Pets | Desenvolvido com <i class="fas fa-heart" style="color: #e91e63;"></i> pela RakyOfficialCenter</p>
            </div>
        </div>
    </div>

    <!-- Botão Voltar ao Topo -->
    <div class="top-btn" id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script src="pets.js"></script>
    <script>
        // Configurações
        const ITENS_POR_PAGINA = 20;
        let petsFiltrados = [];
        let paginaAtual = 1;
        let filtroAtivo = 'todos';
        let ordenacaoAtual = 'valor_desc'; // PADRÃO: MAIS CAROS PRIMEIRO
        let buscaTexto = '';

        // Categorias para filtro
        const categorias = ['todos', 'lendario', 'raro', 'ultra', 'comum', 'alto_valor', 'baixo_valor'];

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof pets !== 'undefined') {
                inicializar();
                // Mostrar/esconder botão topo
                window.addEventListener('scroll', function() {
                    const topBtn = document.getElementById('topBtn');
                    if (window.scrollY > 300) {
                        topBtn.classList.add('show');
                    } else {
                        topBtn.classList.remove('show');
                    }
                });
            } else {
                console.error('Arquivo pets.js não carregado');
                document.getElementById('petsGrid').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erro ao carregar pets!</p></div>';
            }
        });

        function inicializar() {
            criarFiltrosRapidos();
            criarStats();
            aplicarFiltros();
        }

        function criarStats() {
            const total = pets.length;
            const categoriasUnicas = [...new Set(pets.map(p => p.categoria.toLowerCase()))];
            const valores = pets.map(p => p.valor);
            const maiorValor = Math.max(...valores);
            const menorValor = Math.min(...valores);
            
            const stats = [
                { icon: '🐾', value: total, label: 'Total de Pets' },
                { icon: '🏷️', value: categoriasUnicas.length, label: 'Categorias' },
                { icon: '💎', value: `R$ ${maiorValor.toFixed(2)}`, label: 'Mais Caro' },
                { icon: '🎁', value: `R$ ${menorValor.toFixed(2)}`, label: 'Mais Barato' }
            ];
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = stats.map(s => `
                <div class="stat-card">
                    <div class="stat-icon">${s.icon}</div>
                    <div class="stat-value">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join('');
        }

        function criarFiltrosRapidos() {
            const botoes = [
                { id: 'todos', icon: '📋', label: 'Todos os Pets', cor: '' },
                { id: 'lendario', icon: '👑', label: 'Lendários', cor: 'lendario' },
                { id: 'ultra', icon: '⭐', label: 'Ultra Raros', cor: 'ultra' },
                { id: 'raro', icon: '💎', label: 'Raros', cor: 'raro' },
                { id: 'comum', icon: '🌟', label: 'Comuns', cor: 'comum' },
                { id: 'alto_valor', icon: '💰', label: 'Alto Valor (R$1000+)', cor: '' },
                { id: 'baixo_valor', icon: '🎁', label: 'Baixo Valor (R$100-)', cor: '' }
            ];
            
            const container = document.getElementById('filtrosRapidos');
            container.innerHTML = botoes.map(btn => `
                <button class="filtro-btn ${filtroAtivo === btn.id ? 'active' : ''}" onclick="aplicarFiltroCategoria('${btn.id}')">
                    <i>${btn.icon}</i> ${btn.label}
                </button>
            `).join('');
        }

        function aplicarFiltroCategoria(categoria) {
            filtroAtivo = categoria;
            paginaAtual = 1;
            criarFiltrosRapidos();
            aplicarFiltros();
        }

        function aplicarFiltros() {
            let resultados = [...pets];
            
            // Filtro por busca
            const buscaInput = document.getElementById('pesquisa');
            buscaTexto = buscaInput.value.trim().toLowerCase();
            
            if (buscaTexto) {
                resultados = resultados.filter(pet => 
                    pet.nome.toLowerCase().includes(buscaTexto) ||
                    pet.categoria.toLowerCase().includes(buscaTexto)
                );
            }
            
            // Filtro por categoria
            if (filtroAtivo !== 'todos') {
                if (filtroAtivo === 'alto_valor') {
                    resultados = resultados.filter(pet => pet.valor >= 1000);
                } else if (filtroAtivo === 'baixo_valor') {
                    resultados = resultados.filter(pet => pet.valor <= 100);
                } else {
                    resultados = resultados.filter(pet => 
                        pet.categoria.toLowerCase() === filtroAtivo
                    );
                }
            }
            
            // Ordenação (PADRÃO: MAIS CAROS PRIMEIRO)
            const ordenacao = document.getElementById('ordenacaoSelect').value;
            ordenacaoAtual = ordenacao;
            
            switch(ordenacaoAtual) {
                case 'nome_asc':
                    resultados.sort((a, b) => a.nome.localeCompare(b.nome));
                    break;
                case 'nome_desc':
                    resultados.sort((a, b) => b.nome.localeCompare(a.nome));
                    break;
                case 'valor_asc':
                    resultados.sort((a, b) => a.valor - b.valor);
                    break;
                case 'valor_desc':
                    resultados.sort((a, b) => b.valor - a.valor);
                    break;
                case 'categoria':
                    resultados.sort((a, b) => a.categoria.localeCompare(b.categoria));
                    break;
                default:
                    resultados.sort((a, b) => b.valor - a.valor);
            }
            
            petsFiltrados = resultados;
            atualizarInfo();
            renderizarPagina();
        }

        function atualizarInfo() {
            const total = petsFiltrados.length;
            const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA + 1;
            const fim = Math.min(paginaAtual * ITENS_POR_PAGINA, total);
            
            let ordemTexto = '';
            if (ordenacaoAtual === 'valor_desc') ordemTexto = ' 💰 Mais caros primeiro';
            else if (ordenacaoAtual === 'valor_asc') ordemTexto = ' 💰 Mais baratos primeiro';
            else if (ordenacaoAtual === 'nome_asc') ordemTexto = ' 📝 Ordem alfabética A-Z';
            else if (ordenacaoAtual === 'nome_desc') ordemTexto = ' 📝 Ordem alfabética Z-A';
            else if (ordenacaoAtual === 'categoria') ordemTexto = ' 🏷️ Por categoria';
            
            document.getElementById('resultInfo').innerHTML = `
                <i class="fas fa-paw"></i> Mostrando <strong>${inicio}-${fim}</strong> de <strong>${total}</strong> pets
                ${buscaTexto ? ` | 🔍 "${buscaTexto}"` : ''}
                ${filtroAtivo !== 'todos' ? ` | 🎯 ${filtroAtivo.replace('_', ' ')}` : ''}
                <span style="display: block; font-size: 0.7rem; margin-top: 5px;">${ordemTexto}</span>
            `;
        }

        function renderizarPagina() {
            const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
            const fim = inicio + ITENS_POR_PAGINA;
            const petsPagina = petsFiltrados.slice(inicio, fim);
            const grid = document.getElementById('petsGrid');
            
            if (petsPagina.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="fas fa-paw"></i><p>Nenhum pet encontrado!</p></div>`;
                document.getElementById('paginationControls').innerHTML = '';
                return;
            }
            
            grid.innerHTML = petsPagina.map((pet, idx) => {
                let categoriaClass = '';
                const catLower = pet.categoria.toLowerCase();
                if (catLower.includes('lendario')) categoriaClass = 'lendario';
                else if (catLower.includes('ultra')) categoriaClass = 'ultra';
                else if (catLower.includes('raro')) categoriaClass = 'raro';
                else categoriaClass = 'comum';
                
                // Adicionar classe especial para valores altos
                const valorAltoClass = pet.valor >= 1000 ? 'valor-alto' : '';
                
                return `
                    <div class="pet-card ${categoriaClass} ${valorAltoClass}" style="animation-delay: ${(idx % 20) * 0.02}s">
                        <div class="pet-info">
                            <div class="pet-name">${pet.nome}</div>
                            <span class="pet-category ${categoriaClass}">${pet.categoria}</span>
                        </div>
                        <div class="pet-value">
                            <div class="value-amount">R$ ${pet.valor.toFixed(2).replace('.', ',')}</div>
                            <div class="value-label">valor aproximado</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderizarPaginacao();
        }

        function renderizarPaginacao() {
            const totalPaginas = Math.ceil(petsFiltrados.length / ITENS_POR_PAGINA);
            const container = document.getElementById('paginationControls');
            
            if (totalPaginas <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let botoes = '';
            botoes += `<button class="page-btn" onclick="mudarPagina(1)" ${paginaAtual === 1 ? 'disabled' : ''}>«</button>`;
            botoes += `<button class="page-btn" onclick="mudarPagina(${paginaAtual - 1})" ${paginaAtual === 1 ? 'disabled' : ''}>‹</button>`;
            
            // Mostrar páginas (máximo 5)
            let inicioPag = Math.max(1, paginaAtual - 2);
            let fimPag = Math.min(totalPaginas, inicioPag + 4);
            if (fimPag - inicioPag < 4) inicioPag = Math.max(1, fimPag - 4);
            
            for (let i = inicioPag; i <= fimPag; i++) {
                botoes += `<button class="page-btn ${i === paginaAtual ? 'active' : ''}" onclick="mudarPagina(${i})">${i}</button>`;
            }
            
            botoes += `<button class="page-btn" onclick="mudarPagina(${paginaAtual + 1})" ${paginaAtual === totalPaginas ? 'disabled' : ''}>›</button>`;
            botoes += `<button class="page-btn" onclick="mudarPagina(${totalPaginas})" ${paginaAtual === totalPaginas ? 'disabled' : ''}>»</button>`;
            
            container.innerHTML = botoes;
        }

        function mudarPagina(pagina) {
            const totalPaginas = Math.ceil(petsFiltrados.length / ITENS_POR_PAGINA);
            if (pagina < 1 || pagina > totalPaginas) return;
            paginaAtual = pagina;
            renderizarPagina();
            atualizarInfo();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Event Listeners
        document.getElementById('pesquisa').addEventListener('keyup', function() {
            paginaAtual = 1;
            aplicarFiltros();
        });
        
        document.getElementById('ordenacaoSelect').addEventListener('change', function() {
            paginaAtual = 1;
            aplicarFiltros();
        });
    </script>
</body>
</html>
